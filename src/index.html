<!DOCTYPE html>
<html lang="zh-Hans" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唐诗三百首 · 注音版</title>
<link rel="stylesheet" href="//unpkg.com/heti@0.9.4/umd/heti.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== 暗色主题（默认） ===== */
  [data-theme="dark"] {
    color-scheme: dark;
    --bg-primary:    #1a1a2e;
    --bg-secondary:  #16213e;
    --bg-card:       #0f3460;
    --bg-hover:      #1a3a5c;
    --bg-header:     #0a0a1a;
    --text-primary:  #e0d8c8;
    --text-secondary:#a09880;
    --text-muted:    #6c6454;
    --border:        #2a2a4a;
    --accent:        #d4a76a;
    --accent-hover:  #e0b878;
    --shadow:        rgba(0,0,0,0.4);
    --overlay:       rgba(0,0,0,0.5);
    --pinyin-color:  #d4a76a;
    --search-bg:     #0f3460;
    --search-border: rgba(255,255,255,0.2);
  }

  /* ===== 浅色主题 ===== */
  [data-theme="light"] {
    color-scheme: light;
    --bg-primary:    #f8f4ec;
    --bg-secondary:  #f0ece4;
    --bg-card:       #fffdf7;
    --bg-hover:      #fdf8ed;
    --bg-header:     #2c2416;
    --text-primary:  #2c2416;
    --text-secondary:#8b7355;
    --text-muted:    #9e9e9e;
    --border:        #e0d8c8;
    --accent:        #8b4513;
    --accent-hover:  #a0551e;
    --shadow:        rgba(139,69,19,0.08);
    --overlay:       rgba(0,0,0,0.3);
    --pinyin-color:  #8b4513;
    --search-bg:     rgba(255,255,255,0.1);
    --search-border: rgba(255,255,255,0.3);
  }

  :root {
    --sidebar-w: 240px;
    --header-h: 52px;
    --footer-h: 40px;
  }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ===== 顶栏 ===== */
  .header {
    height: var(--header-h);
    background: var(--bg-header);
    color: #e0d8c8;
    display: flex;
    align-items: center;
    padding: 0 20px;
    flex-shrink: 0;
    gap: 16px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .header .search-wrap {
    margin-left: auto;
    position: relative;
  }
  .header .search-wrap input {
    width: 180px;
    padding: 6px 12px 6px 30px;
    border: 1px solid var(--search-border);
    border-radius: 20px;
    background: var(--search-bg);
    color: #e0d8c8;
    font-size: 13px;
    outline: none;
    transition: width 0.3s;
  }
  .header .search-wrap input::placeholder { color: rgba(255,255,255,0.5); }
  .header .search-wrap input:focus { width: 240px; border-color: var(--accent); }
  .header .search-wrap .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 14px; opacity: 0.6;
  }
  .search-results {
    position: absolute; top: 100%; right: 0; width: 320px; max-height: 400px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 12px var(--shadow); overflow-y: auto; z-index: 100;
    display: none;
  }
  .search-results.show { display: block; }
  .search-results .sr-item {
    padding: 8px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .search-results .sr-item:hover { background: var(--bg-hover); }
  .search-results .sr-item .sr-title { font-weight: 600; }
  .search-results .sr-item .sr-meta { color: var(--text-secondary); font-size: 12px; }
  .search-results .sr-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; }

  .menu-btn {
    display: none; background: none; border: none; color: #e0d8c8;
    font-size: 22px; cursor: pointer; padding: 4px;
  }

  .header-btn {
    background: none; border: 1px solid rgba(255,255,255,0.3);
    color: #e0d8c8; padding: 4px 12px; border-radius: 4px;
    cursor: pointer; font-size: 14px; transition: border-color 0.2s;
  }
  .header-btn:hover { border-color: var(--accent); }

  /* ===== 主体布局 ===== */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ===== 侧栏 ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    transition: transform 0.3s;
  }
  .sidebar .vol-group { margin-bottom: 4px; }
  .sidebar .vol-title {
    padding: 10px 16px; font-size: 13px; font-weight: 600;
    color: var(--accent); background: var(--bg-primary);
    border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    user-select: none;
  }
  .sidebar .vol-title .arrow { font-size: 10px; transition: transform 0.2s; }
  .sidebar .vol-title.collapsed .arrow { transform: rotate(-90deg); }
  .sidebar .vol-poems { overflow: hidden; }
  .sidebar .vol-poems.hidden { display: none; }
  .sidebar .poem-item {
    padding: 6px 16px 6px 24px; font-size: 13px; cursor: pointer;
    border-bottom: 1px solid var(--border); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; transition: background 0.15s;
  }
  .sidebar .poem-item:hover { background: var(--bg-hover); }
  .sidebar .poem-item.active { background: var(--accent); color: #fff; font-weight: 600; }
  .sidebar .poem-item .poem-num { color: var(--text-secondary); font-size: 11px; margin-right: 4px; }
  .sidebar .poem-item.active .poem-num { color: rgba(255,255,255,0.7); }

  /* ===== 内容区 ===== */
  .content {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; position: relative;
  }
  .poem-view {
    flex: 1; display: flex; justify-content: center;
    align-items: flex-start; padding: 24px; overflow: hidden;
  }

  /* ===== 诗文卡片 ===== */
  .poem-card {
    background: var(--bg-card);
    border: 2px solid var(--accent);
    border-radius: 4px;
    padding: 36px 28px;
    min-height: 300px;
    max-width: min(calc(100vw - var(--sidebar-w) - 80px), 800px);
    max-height: calc(100vh - var(--header-h) - var(--footer-h) - 120px);
    box-shadow: 0 2px 12px var(--shadow);
  }

  /* 横排：卡片自身滚动 */
  .poem-card[data-dir="horizontal"] {
    overflow: auto;
  }

  /* 竖排：卡片不滚动，由 poem-body 内部滚动 */
  .poem-card[data-dir="vertical"] {
    overflow: hidden;
  }

  .poem-body {
    font-size: var(--font-size, 22px);
    line-height: var(--line-height, 3.2);
    letter-spacing: var(--letter-spacing, 4px);
    font-family: var(--poem-font, "Noto Serif SC", "SimSun", serif);
  }

  /* 竖排 poem-body：自身处理溢出和滚动 */
  .poem-card[data-dir="vertical"] .poem-body {
    writing-mode: vertical-rl;
    text-orientation: upright;
    max-width: min(calc(100vw - var(--sidebar-w) - 140px), 700px);
    max-height: calc(100vh - var(--header-h) - var(--footer-h) - 200px);
    overflow: auto;
  }

  /* 横排 poem-body：由卡片滚动 */
  .poem-card[data-dir="horizontal"] .poem-body {
    writing-mode: horizontal-tb;
  }
  .poem-body h2 {
    font-size: 24px; margin-bottom: 4px; letter-spacing: 4px;
  }
  .poem-body .poem-author {
    display: block; font-size: 18px; color: var(--text-secondary);
    margin-bottom: 20px; letter-spacing: 3px;
  }

  /* ===== 注音定位系统 ===== */
  .pz {
    position: relative;
    display: inline;
  }
  .pz-base {
    /* 汉字基线 */
  }
  .pz-text {
    position: absolute;
    writing-mode: horizontal-tb;
    white-space: nowrap;
    pointer-events: none;
    line-height: 1;
    font-size: var(--pinyin-size, 0.42em);
    color: var(--pinyin-color);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    letter-spacing: 0;
  }

  /* 右侧：竖排标准（注音在行右） */
  .poem-card[data-pos="right"] .pz-text {
    left: 100%;
    top: 50%;
    transform: translateY(-50%);
    margin-left: var(--pz-offset, 2px);
  }
  /* 左侧 */
  .poem-card[data-pos="left"] .pz-text {
    right: 100%;
    top: 50%;
    transform: translateY(-50%);
    margin-right: var(--pz-offset, 2px);
  }
  /* 上方 */
  .poem-card[data-pos="top"] .pz-text {
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: var(--pz-offset, 2px);
  }
  /* 下方 */
  .poem-card[data-pos="bottom"] .pz-text {
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-top: var(--pz-offset, 2px);
  }

  /* 标点占位 */
  .pz-punct {
    display: inline-block;
    text-align: center;
    min-width: 0.6em;
    padding: 0.05em 0;
  }

  /* 导航栏 */
  .nav-bar {
    display: flex; justify-content: center; align-items: center;
    gap: 24px; padding: 12px; flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-header); color: #e0d8c8; border: none;
    padding: 8px 20px; border-radius: 4px; cursor: pointer;
    font-size: 13px; transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: var(--bg-header); }

  .footer {
    height: var(--footer-h); background: var(--bg-header);
    color: rgba(224,216,200,0.7); display: flex;
    align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0;
  }

  .loading {
    display: flex; justify-content: center; align-items: center;
    flex: 1; font-size: 16px; color: var(--text-secondary);
  }

  /* ===== 设置面板 ===== */
  .settings-overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--overlay); z-index: 200;
  }
  .settings-overlay.show { display: block; }

  .settings-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 300px; background: var(--bg-secondary);
    border-left: 1px solid var(--border); z-index: 210;
    transform: translateX(100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column;
    box-shadow: -4px 0 12px var(--shadow);
  }
  .settings-panel.open { transform: translateX(0); }

  .settings-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .settings-header h3 { font-size: 16px; font-weight: 600; color: var(--accent); }
  .settings-close {
    background: none; border: none; color: var(--text-secondary);
    font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1;
  }
  .settings-close:hover { color: var(--text-primary); }

  .settings-body { flex: 1; overflow-y: auto; padding: 20px; }
  .setting-group { margin-bottom: 20px; }
  .setting-group label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-primary); margin-bottom: 8px;
  }
  .setting-group .setting-value {
    float: right; font-weight: 400; color: var(--text-muted); font-size: 12px;
  }

  .btn-group { display: flex; gap: 6px; }
  .btn-group button {
    flex: 1; padding: 6px 8px; font-size: 12px;
    background: var(--bg-primary); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-group button:hover { border-color: var(--accent); }
  .btn-group button.active {
    background: var(--accent); color: #fff;
    border-color: var(--accent); font-weight: 600;
  }

  .setting-select {
    width: 100%; padding: 8px 12px;
    background: var(--bg-primary); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; outline: none; cursor: pointer;
  }
  .setting-select:focus { border-color: var(--accent); }
  .setting-select option { background: var(--bg-primary); color: var(--text-primary); }

  .setting-range {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 6px; background: var(--border); border-radius: 3px;
    outline: none; cursor: pointer;
  }
  .setting-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; background: var(--accent);
    border-radius: 50%; cursor: pointer;
  }
  .setting-range::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--accent);
    border-radius: 50%; border: none; cursor: pointer;
  }

  .settings-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .reset-btn {
    width: 100%; padding: 10px;
    background: var(--bg-primary); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== 移动端 ===== */
  .sidebar-overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--overlay); z-index: 90;
  }
  .sidebar-overlay.show { display: block; }

  @media (max-width: 768px) {
    .menu-btn { display: block; }
    .sidebar {
      position: fixed; top: var(--header-h); left: 0; bottom: var(--footer-h);
      z-index: 95; transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .header .search-wrap input { width: 120px; }
    .header .search-wrap input:focus { width: 160px; }
    .poem-view { padding: 16px; }
    .poem-card {
      padding: 24px 16px;
      max-width: calc(100vw - 48px);
    }
    .poem-card[data-dir="vertical"] .poem-body {
      max-width: calc(100vw - 100px);
    }
    .poem-body { font-size: 18px; }
    .settings-panel { width: 100%; }
  }
</style>
</head>
<body>

<!-- 顶栏 -->
<header class="header">
  <button class="menu-btn" id="menuBtn" title="目录">☰</button>
  <h1>唐诗三百首 · 注音版</h1>
  <button class="header-btn" id="themeBtn" title="切换主题">🌙</button>
  <button class="header-btn" id="settingsBtn" title="排版设置">⚙</button>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="搜索诗题、作者、诗句…">
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<!-- 主体 -->
<div class="main">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar"></nav>
  <div class="content">
    <div class="poem-view" id="poemView">
      <div class="loading" id="loading">加载中…</div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" id="prevBtn">◀ 上一首</button>
      <button class="nav-btn" id="nextBtn">下一首 ▶</button>
    </div>
  </div>
</div>

<footer class="footer" id="footer">唐诗三百首 · 注音版</footer>

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h3>⚙ 排版设置</h3>
    <button class="settings-close" id="settingsClose">✕</button>
  </div>
  <div class="settings-body">
    <div class="setting-group">
      <label>明暗主题</label>
      <div class="btn-group" data-setting="theme">
        <button data-value="light">浅色</button>
        <button data-value="dark">深色</button>
        <button data-value="auto">自动</button>
      </div>
    </div>
    <div class="setting-group">
      <label>字体</label>
      <select class="setting-select" data-setting="font">
        <option value="serif">宋体</option>
        <option value="kai">楷体</option>
        <option value="sans">黑体</option>
        <option value="fangsong">仿宋</option>
      </select>
    </div>
    <div class="setting-group">
      <label>字号 <span class="setting-value" id="fontSizeVal">22px</span></label>
      <input type="range" class="setting-range" data-setting="fontSize" min="14" max="36" value="22" step="1">
    </div>
    <div class="setting-group">
      <label>字距 <span class="setting-value" id="letterSpacingVal">4px</span></label>
      <input type="range" class="setting-range" data-setting="letterSpacing" min="0" max="12" value="4" step="1">
    </div>
    <div class="setting-group">
      <label>行距 <span class="setting-value" id="lineHeightVal">3.2</span></label>
      <input type="range" class="setting-range" data-setting="lineHeight" min="1.5" max="5.0" value="3.2" step="0.1">
    </div>
    <div class="setting-group">
      <label>拼音大小 <span class="setting-value" id="pinyinSizeVal">0.42em</span></label>
      <input type="range" class="setting-range" data-setting="pinyinSize" min="0.2" max="0.8" value="0.42" step="0.02">
    </div>
    <div class="setting-group">
      <label>注音距离 <span class="setting-value" id="pzOffsetVal">2px</span></label>
      <input type="range" class="setting-range" data-setting="pzOffset" min="0" max="16" value="2" step="1">
    </div>
    <div class="setting-group">
      <label>拼音位置</label>
      <div class="btn-group" data-setting="rubyPosition" style="flex-wrap:wrap">
        <button data-value="top">上方</button>
        <button data-value="bottom">下方</button>
        <button data-value="left">左侧</button>
        <button data-value="right">右侧</button>
      </div>
    </div>
    <div class="setting-group">
      <label>排版方向</label>
      <div class="btn-group" data-setting="direction">
        <button data-value="vertical">竖排</button>
        <button data-value="horizontal">横排</button>
      </div>
    </div>
    <hr class="settings-divider">
    <button class="reset-btn" id="resetBtn">恢复默认设置</button>
  </div>
</div>

<script src="//unpkg.com/heti@0.9.4/umd/heti-addon.min.js"></script>
<script>
(function() {
  let data = null;
  let currentIndex = 0;

  const PUNCT_RE = /[，。、；：！？""''《》（）—…·「」『』【】〔〕〈〉　-〿＀-￯]/;

  const DEFAULTS = {
    theme: 'dark',
    font: 'serif',
    fontSize: 22,
    letterSpacing: 4,
    lineHeight: 3.2,
    pinyinSize: 0.42,
    pzOffset: 2,
    rubyPosition: 'right',
    direction: 'vertical'
  };

  const FONT_MAP = {
    serif: '"Noto Serif SC", "SimSun", "Songti SC", serif',
    kai: '"ZCOOL XiaoWei", "KaiTi", "STKaiti", serif',
    sans: '"Noto Sans SC", "Microsoft YaHei", sans-serif',
    fangsong: '"FangSong", "STFangsong", serif'
  };

  let settings = {};

  function loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem('poem-settings') || '{}');
      settings = Object.assign({}, DEFAULTS, saved);
    } catch { settings = Object.assign({}, DEFAULTS); }
  }

  function saveSettings() {
    localStorage.setItem('poem-settings', JSON.stringify(settings));
  }

  function applySettings() {
    applyTheme(settings.theme);

    const root = document.documentElement.style;
    root.setProperty('--poem-font', FONT_MAP[settings.font] || FONT_MAP.serif);
    root.setProperty('--font-size', settings.fontSize + 'px');
    root.setProperty('--letter-spacing', settings.letterSpacing + 'px');
    root.setProperty('--line-height', settings.lineHeight);
    root.setProperty('--pinyin-size', settings.pinyinSize + 'em');
    root.setProperty('--pz-offset', settings.pzOffset + 'px');

    document.getElementById('fontSizeVal').textContent = settings.fontSize + 'px';
    document.getElementById('letterSpacingVal').textContent = settings.letterSpacing + 'px';
    document.getElementById('lineHeightVal').textContent = settings.lineHeight;
    document.getElementById('pinyinSizeVal').textContent = settings.pinyinSize + 'em';
    document.getElementById('pzOffsetVal').textContent = settings.pzOffset + 'px';

    // 实时更新排版方向和拼音位置（无需重新渲染）
    const card = document.querySelector('.poem-card');
    if (card) {
      card.dataset.dir = settings.direction;
      card.dataset.pos = settings.rubyPosition;
    }

    syncPanelControls();
  }

  function syncPanelControls() {
    document.querySelectorAll('.btn-group[data-setting]').forEach(group => {
      const key = group.dataset.setting;
      group.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === settings[key]);
      });
    });
    document.querySelectorAll('.setting-select[data-setting]').forEach(sel => {
      sel.value = settings[sel.dataset.setting];
    });
    document.querySelectorAll('.setting-range[data-setting]').forEach(range => {
      range.value = settings[range.dataset.setting];
    });
  }

  // ===== 主题 =====
  const themeBtn = document.getElementById('themeBtn');
  function applyTheme(theme) {
    let actual = theme;
    if (theme === 'auto') {
      actual = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.dataset.theme = actual;
    themeBtn.textContent = actual === 'dark' ? '🌙' : '☀️';
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (settings.theme === 'auto') applyTheme('auto');
  });

  // ===== 设置面板 =====
  const settingsPanel = document.getElementById('settingsPanel');
  const settingsOverlay = document.getElementById('settingsOverlay');

  document.getElementById('settingsBtn').addEventListener('click', () => {
    settingsPanel.classList.add('open');
    settingsOverlay.classList.add('show');
  });
  function closeSettings() {
    settingsPanel.classList.remove('open');
    settingsOverlay.classList.remove('show');
  }
  document.getElementById('settingsClose').addEventListener('click', closeSettings);
  settingsOverlay.addEventListener('click', closeSettings);

  document.querySelectorAll('.btn-group[data-setting]').forEach(group => {
    group.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        settings[group.dataset.setting] = btn.dataset.value;
        saveSettings();
        applySettings();
      });
    });
  });
  document.querySelectorAll('.setting-select[data-setting]').forEach(sel => {
    sel.addEventListener('change', () => {
      settings[sel.dataset.setting] = sel.value;
      saveSettings();
      applySettings();
    });
  });
  document.querySelectorAll('.setting-range[data-setting]').forEach(range => {
    range.addEventListener('input', () => {
      settings[range.dataset.setting] = parseFloat(range.value);
      saveSettings();
      applySettings();
    });
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    settings = Object.assign({}, DEFAULTS);
    saveSettings();
    applySettings();
  });
  themeBtn.addEventListener('click', () => {
    settings.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    saveSettings();
    applySettings();
  });

  // ===== 数据加载 =====
  async function loadData() {
    const res = await fetch('data.json');
    data = await res.json();
    document.getElementById('loading').remove();
    renderSidebar();
    navigateFromHash();
  }

  // ===== Hash 路由 =====
  function navigateFromHash() {
    const hash = location.hash.replace('#', '');
    if (hash) {
      const idx = data.poems.findIndex(p => p.number === hash);
      if (idx >= 0) { currentIndex = idx; }
    }
    renderPoem();
  }

  // ===== 侧栏 =====
  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    let html = '';
    data.volumes.forEach(vol => {
      const volPoems = data.poems.filter(p => p.volumeId === vol.id);
      html += '<div class="vol-group">';
      html += `<div class="vol-title" data-vol="${vol.id}">${vol.name}<span class="arrow">▼</span></div>`;
      html += `<div class="vol-poems" data-vol-poems="${vol.id}">`;
      volPoems.forEach(p => {
        html += `<div class="poem-item" data-idx="${p.id - 1}"><span class="poem-num">${p.number}</span>${p.title}</div>`;
      });
      html += '</div></div>';
    });
    sidebar.innerHTML = html;

    sidebar.querySelectorAll('.vol-title').forEach(el => {
      el.addEventListener('click', () => {
        el.classList.toggle('collapsed');
        const poems = sidebar.querySelector(`[data-vol-poems="${el.dataset.vol}"]`);
        poems.classList.toggle('hidden');
      });
    });
    sidebar.querySelectorAll('.poem-item').forEach(el => {
      el.addEventListener('click', () => {
        currentIndex = parseInt(el.dataset.idx);
        renderPoem();
        closeSidebar();
      });
    });
  }

  // ===== 诗文渲染 =====
  function renderAnnotated(chars) {
    return chars.map(c => {
      if (c.pinyin) {
        return `<span class="pz"><span class="pz-base">${c.char}</span><span class="pz-text">${c.pinyin}</span></span>`;
      } else if (PUNCT_RE.test(c.char)) {
        return `<span class="pz-punct">${c.char}</span>`;
      }
      return c.char;
    }).join('');
  }

  function renderPoem() {
    const poem = data.poems[currentIndex];
    const view = document.getElementById('poemView');

    let linesHtml = '';
    poem.lines.forEach(line => {
      linesHtml += renderAnnotated(line.chars) + '<br>';
    });

    view.innerHTML = `
      <div class="poem-card" data-dir="${settings.direction}" data-pos="${settings.rubyPosition}">
        <div class="poem-body heti">
          <h2>${poem.title}</h2>
          <span class="poem-author">〔唐〕${poem.author}</span>
          <p class="poem-lines">${linesHtml}</p>
        </div>
      </div>
    `;

    // 侧栏高亮
    document.querySelectorAll('.poem-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.idx) === currentIndex);
    });
    const activeItem = document.querySelector('.poem-item.active');
    if (activeItem) {
      activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      const volPoems = activeItem.closest('.vol-poems');
      if (volPoems && volPoems.classList.contains('hidden')) {
        volPoems.classList.remove('hidden');
        const volTitle = volPoems.previousElementSibling;
        if (volTitle) volTitle.classList.remove('collapsed');
      }
    }

    document.getElementById('footer').textContent = `第 ${currentIndex + 1} 首 / 共 ${data.poems.length} 首`;
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === data.poems.length - 1;
    location.hash = poem.number;

    if (typeof Heti !== 'undefined') new Heti('.heti');
  }

  // ===== 导航 =====
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderPoem(); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (currentIndex < data.poems.length - 1) { currentIndex++; renderPoem(); }
  });
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (currentIndex > 0) { currentIndex--; renderPoem(); }
    } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      if (currentIndex < data.poems.length - 1) { currentIndex++; renderPoem(); }
    } else if (e.key === 'Escape') {
      closeSettings();
    }
  });
  window.addEventListener('hashchange', navigateFromHash);

  // ===== 搜索 =====
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q || !data) { searchResults.classList.remove('show'); return; }
    const matches = data.poems.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.author.toLowerCase().includes(q) ||
      p.lines.some(l => l.text.toLowerCase().includes(q))
    ).slice(0, 20);

    if (matches.length === 0) {
      searchResults.innerHTML = '<div class="sr-empty">未找到匹配结果</div>';
    } else {
      searchResults.innerHTML = matches.map(p => `
        <div class="sr-item" data-idx="${p.id - 1}">
          <div class="sr-title">${p.number} ${p.title}</div>
          <div class="sr-meta">[唐]${p.author}</div>
        </div>
      `).join('');
    }
    searchResults.classList.add('show');
    searchResults.querySelectorAll('.sr-item').forEach(el => {
      el.addEventListener('click', () => {
        currentIndex = parseInt(el.dataset.idx);
        renderPoem();
        searchResults.classList.remove('show');
        searchInput.value = '';
        closeSidebar();
      });
    });
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
  });

  // ===== 移动端侧栏 =====
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  document.getElementById('menuBtn').addEventListener('click', () => {
    sidebar.classList.add('open');
    overlay.classList.add('show');
  });
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }
  overlay.addEventListener('click', closeSidebar);

  // ===== 启动 =====
  loadSettings();
  applySettings();
  loadData();
})();
</script>
</body>
</html>
